theme:
  name: shadcn
  custom_dir: overrides
  show_title: false
  show_stargazers: false
  topbar_sections: true
  show_datetime: true
  accent: "oklch(54.6% 0.245 262.881)"
  pygments_style:
    light: shadcn-light
    dark: nord-darker
  katex_options:
    macros:
      "\\RR": "\\mathbb{R}"

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang:
        - en
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            show_if_no_docstring: false
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
            merge_init_into_class: true
            show_submodules: false
            docstring_section_style: spacy
            members_order: source
            show_labels: true

# Markdown extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: dream3d
      repo: dream-trainer

extra_css:
  - stylesheets/pygments-syntax.css
  - stylesheets/shadcn-overrides.css

# Watch for changes in includes directory
watch:
  - includes
